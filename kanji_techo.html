<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>かんじ手帳</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@400;700;900&family=BIZ+UDPMincho&family=Zen+Kurenaido&family=Sawarabi+Mincho&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #faf7f2;
      font-family: 'Zen Maru Gothic', 'Noto Sans JP', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    #app {
      max-width: 480px;
      min-height: 100dvh;
      margin: 0 auto;
      background: #faf7f2;
      display: flex;
      flex-direction: column;
    }
    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; min-height: 100dvh; }

    /* ===== START SCREEN ===== */
    #start-screen {
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 40px 24px;
    }
    .app-icon { font-size: 80px; line-height: 1; }
    .app-title {
      font-size: 38px; font-weight: 900;
      color: #2d2016;
      text-align: center;
      letter-spacing: 0.06em;
    }
    .app-sub {
      font-size: 14px; color: #8b7355;
      text-align: center; line-height: 1.6;
    }
    .level-section {
      width: 100%;
    }
    .level-label {
      font-size: 11px; font-weight: 700; color: #b5a08a;
      letter-spacing: 0.12em; margin-bottom: 10px;
      display: block;
    }
    .level-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .level-btn {
      background: #fff;
      border: 2px solid #e8ddd0;
      border-radius: 14px;
      padding: 14px 8px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      display: flex; flex-direction: column; gap: 4px; align-items: center;
      -webkit-appearance: none;
    }
    .level-btn:active { transform: scale(0.96); }
    .level-btn.selected {
      border-color: #c0561e;
      background: #fff5f0;
    }
    .lv-kanji {
      font-size: 22px; font-weight: 900;
      color: #2d2016;
    }
    .lv-label {
      font-size: 11px; color: #8b7355;
      font-weight: 700;
    }
    .start-btn {
      background: #c0561e;
      color: #fff;
      border: none;
      border-radius: 18px;
      padding: 18px 0;
      width: 100%;
      font-size: 18px;
      font-weight: 900;
      font-family: 'Zen Maru Gothic', sans-serif;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: transform 0.1s, opacity 0.1s;
    }
    .start-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .start-btn:not(:disabled):active { transform: scale(0.97); }

    /* ===== QUIZ SCREEN ===== */
    #quiz-screen { flex: 1; }

    .quiz-header {
      background: #2d2016;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-title {
      font-size: 13px; font-weight: 700;
      color: #d4b896;
      letter-spacing: 0.08em;
    }
    .progress-wrap {
      flex: 1;
      background: rgba(255,255,255,0.15);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #e8874a;
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-text {
      font-size: 13px; font-weight: 700;
      color: #d4b896;
      min-width: 48px;
      text-align: right;
    }

    .quiz-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 20px 16px;
      gap: 14px;
    }

    /* 問題カード */
    .question-card {
      background: #fff;
      border-radius: 20px;
      padding: 24px 20px 20px;
      box-shadow: 0 2px 12px rgba(45,32,22,0.08);
      text-align: center;
    }
    .question-hint {
      font-size: 11px; font-weight: 700;
      color: #c0561e;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .question-reading {
      font-size: 32px; font-weight: 900;
      color: #2d2016;
      letter-spacing: 0.06em;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .question-meaning {
      font-size: 14px; color: #8b7355;
      font-weight: 500;
      line-height: 1.5;
    }
    .question-example {
      font-size: 15px; color: #4a3825;
      font-weight: 700;
      line-height: 1.6;
      background: #fdf5ec;
      border-left: 3px solid #e8874a;
      border-radius: 8px;
      padding: 8px 12px;
      margin-top: 6px;
      text-align: left;
    }
    .question-example-label {
      font-size: 10px; color: #c0561e;
      font-weight: 700; letter-spacing: 0.1em;
      display: block; margin-bottom: 2px;
    }
    .masked {
      display: inline-block;
      background: #2d2016;
      color: #2d2016;
      border-radius: 3px;
      min-width: 1em;
      line-height: 1;
    }

    /* 入力エリア（手書きキャンバス） */
    .input-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .input-label {
      font-size: 11px; font-weight: 700;
      color: #b5a08a;
      letter-spacing: 0.1em;
    }
    .canvas-wrap {
      position: relative;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 2px 16px rgba(45,32,22,0.10);
      overflow: hidden;
      width: 100%;
      aspect-ratio: 1 / 1;
    }
    #draw-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
    }
    /* 格子ガイド */
    .canvas-guide {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }
    /* 正解文字オーバーレイ */
    .answer-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      font-family: 'Sawarabi Mincho', 'Zen Kurenaido', serif;
      font-weight: 400;
      font-size: min(45vw, 45vh);
      color: rgba(200, 30, 30, 0.28);
      line-height: 1;
      user-select: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .answer-overlay.show {
      opacity: 1;
    }
    .input-actions {
      display: flex;
      gap: 10px;
    }
    .clear-btn {
      flex: 1;
      background: #f3ede6;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 14px;
      font-weight: 700;
      color: #8b7355;
      cursor: pointer;
      font-family: 'Zen Maru Gothic', sans-serif;
      transition: background 0.15s;
    }
    .clear-btn:active { background: #e8ddd0; }
    .submit-btn {
      flex: 2;
      background: #c0561e;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      font-family: 'Zen Maru Gothic', sans-serif;
      letter-spacing: 0.06em;
      transition: opacity 0.15s;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .submit-btn:not(:disabled):active { opacity: 0.85; }

    /* 判定パネル（インライン） */
    .result-overlay {
      display: none;
      padding: 0 0 16px;
    }
    .result-overlay.show {
      display: block;
    }
    .result-card {
      background: #fff;
      border-radius: 22px;
      padding: 16px 20px 18px;
      box-shadow: 0 4px 20px rgba(45,32,22,0.12);
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .result-icon {
      font-size: 32px;
      text-align: center;
    }
    .result-label {
      font-size: 18px; font-weight: 900;
      text-align: center;
      margin-bottom: 0;
    }
    .result-label.correct { color: #1a7a3e; }
    .result-label.wrong { color: #c0561e; }
    .result-detail {
      font-size: 13px; color: #8b7355;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .result-answer {
      font-size: 26px; font-weight: 900;
      text-align: center;
      color: #2d2016;
      margin-bottom: 0;
    }
    .next-btn {
      width: 100%;
      background: #2d2016;
      border: none;
      border-radius: 14px;
      padding: 13px;
      font-size: 15px;
      font-weight: 900;
      color: #faf7f2;
      cursor: pointer;
      font-family: 'Zen Maru Gothic', sans-serif;
      letter-spacing: 0.08em;
      transition: opacity 0.15s;
    }
    .next-btn:active { opacity: 0.85; }

    /* ===== RESULT SCREEN ===== */
    #result-screen {
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 24px;
    }
    .final-icon { font-size: 80px; line-height: 1; }
    .final-title {
      font-size: 28px; font-weight: 900;
      color: #2d2016;
      text-align: center;
    }
    .score-card {
      background: #fff;
      border-radius: 22px;
      padding: 28px 40px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(45,32,22,0.1);
      width: 100%;
    }
    .score-num {
      font-size: 64px; font-weight: 900;
      color: #c0561e;
      line-height: 1;
    }
    .score-sub {
      font-size: 14px; color: #8b7355;
      font-weight: 700;
      margin-top: 6px;
    }
    .score-breakdown {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 14px;
    }
    .score-item {
      display: flex; flex-direction: column;
      gap: 4px; align-items: center;
    }
    .score-item-num {
      font-size: 24px; font-weight: 900;
    }
    .score-item-num.ok { color: #1a7a3e; }
    .score-item-num.ng { color: #c0561e; }
    .score-item-label {
      font-size: 11px; color: #b5a08a;
      font-weight: 700; letter-spacing: 0.1em;
    }
    .wrong-list-section { width: 100%; }
    .wrong-list-title {
      font-size: 12px; font-weight: 700;
      color: #b5a08a; letter-spacing: 0.1em;
      margin-bottom: 10px;
    }
    .wrong-list {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .wrong-item {
      background: #fff;
      border: 2px solid #f3ede6;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 16px; font-weight: 700;
      color: #2d2016;
      display: flex; flex-direction: column;
      align-items: center; gap: 2px;
    }
    .wrong-item-reading {
      font-size: 10px; color: #b5a08a; font-weight: 500;
    }
    .retry-btn {
      width: 100%;
      background: #c0561e;
      border: none;
      border-radius: 18px;
      padding: 18px;
      font-size: 17px; font-weight: 900;
      color: #fff;
      cursor: pointer;
      font-family: 'Zen Maru Gothic', sans-serif;
      letter-spacing: 0.08em;
      transition: opacity 0.15s;
    }
    .retry-btn:active { opacity: 0.85; }
    .home-btn {
      background: none;
      border: 2px solid #e8ddd0;
      border-radius: 18px;
      padding: 16px;
      width: 100%;
      font-size: 15px; font-weight: 700;
      color: #8b7355;
      cursor: pointer;
      font-family: 'Zen Maru Gothic', sans-serif;
      transition: background 0.15s;
    }
    .home-btn:active { background: #f3ede6; }

    /* ローディング */
    .loading-indicator {
      display: flex; align-items: center;
      gap: 8px;
      font-size: 13px; color: #b5a08a;
      font-weight: 700;
      justify-content: center;
      padding: 4px 0;
      min-height: 22px;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #e8ddd0;
      border-top-color: #c0561e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* ===== 記録画面 ===== */
    #stats-screen {
      align-items: center;
      gap: 18px;
      padding: 28px 20px 40px;
    }
    .stats-header {
      width: 100%;
      display: flex; align-items: center; justify-content: space-between;
    }
    .stats-title { font-size: 20px; font-weight: 900; color: #2d2016; }
    .stats-close {
      background: #f3ede6; border: none; border-radius: 50%;
      width: 36px; height: 36px; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .stats-summary {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 10px; width: 100%;
    }
    .stat-box {
      background: #fff; border-radius: 16px;
      padding: 14px 8px; text-align: center;
      box-shadow: 0 2px 8px rgba(45,32,22,0.07);
    }
    .stat-box-num { font-size: 26px; font-weight: 900; color: #c0561e; }
    .stat-box-label { font-size: 10px; color: #b5a08a; font-weight: 700; margin-top: 2px; }
    .history-section { width: 100%; }
    .history-title {
      font-size: 11px; font-weight: 700; color: #b5a08a;
      letter-spacing: 0.1em; margin-bottom: 10px;
    }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      background: #fff; border-radius: 14px;
      padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 6px rgba(45,32,22,0.06);
    }
    .history-lv {
      background: #fdf0e8; color: #c0561e;
      font-size: 11px; font-weight: 900;
      border-radius: 8px; padding: 4px 8px;
      min-width: 40px; text-align: center;
    }
    .history-score { font-size: 15px; font-weight: 900; color: #2d2016; margin-left: auto; }
    .history-date { font-size: 11px; color: #b5a08a; }

    /* 苦手リスト */
    .weak-section { width: 100%; }
    .weak-title {
      font-size: 11px; font-weight: 700; color: #b5a08a;
      letter-spacing: 0.1em; margin-bottom: 10px;
    }
    .weak-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .weak-chip {
      background: #fff; border: 2px solid #fde8dd;
      border-radius: 12px; padding: 8px 12px;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .weak-chip-kanji { font-size: 20px; font-weight: 900; color: #2d2016; }
    .weak-chip-reading { font-size: 10px; color: #b5a08a; }
    .weak-chip-count { font-size: 10px; color: #c0561e; font-weight: 700; }
    .weak-drill-btn {
      width: 100%;
      background: #7c3d10;
      border: none; border-radius: 16px;
      padding: 16px; font-size: 15px; font-weight: 900;
      color: #fff; cursor: pointer;
      font-family: 'Zen Maru Gothic', sans-serif;
      letter-spacing: 0.06em;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s;
    }
    .weak-drill-btn:active { opacity: 0.85; }
    .weak-drill-btn.disabled { opacity: 0.4; cursor: not-allowed; }
    .clear-stats-btn {
      background: none; border: 1px solid #e8ddd0;
      border-radius: 12px; padding: 10px 18px;
      font-size: 12px; color: #b5a08a; font-weight: 700;
      cursor: pointer; font-family: 'Zen Maru Gothic', sans-serif;
    }

    /* ホーム下部ボタン群 */
    .home-action-row {
      display: flex; gap: 10px; width: 100%;
    }
    .stats-open-btn {
      flex: 1;
      background: #fff; border: 2px solid #e8ddd0;
      border-radius: 16px; padding: 14px 8px;
      font-size: 13px; font-weight: 700; color: #8b7355;
      cursor: pointer; font-family: 'Zen Maru Gothic', sans-serif;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      transition: background 0.15s;
    }
    .stats-open-btn:active { background: #f3ede6; }
    .stats-open-btn .btn-icon { font-size: 22px; }
    .weak-open-btn {
      flex: 1;
      background: #fff5f0; border: 2px solid #f5c4a8;
      border-radius: 16px; padding: 14px 8px;
      font-size: 13px; font-weight: 700; color: #c0561e;
      cursor: pointer; font-family: 'Zen Maru Gothic', sans-serif;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      transition: background 0.15s;
    }
    .weak-open-btn:active { background: #fde8dd; }
    .weak-open-btn .btn-icon { font-size: 22px; }
    .weak-open-btn.disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-sub { font-size: 10px; color: #b5a08a; font-weight: 500; }
    .weak-open-btn .btn-sub { color: #e8874a; }

  </style>
</head>
<body>
<div id="app">

  <!-- ===== スタート画面 ===== -->
  <div id="start-screen" class="screen active">
    <div class="app-icon">📖</div>
    <div>
      <div class="app-title">かんじ手帳</div>
      <div class="app-sub">Apple Pencilで漢字を練習しよう<br>1セット10問</div>
    </div>

    <div class="level-section">
      <span class="level-label">LEVEL を選ぼう</span>
      <div class="level-grid">
        <button class="level-btn" data-level="1" onclick="selectLevel(1)">
          <span class="lv-kanji">一</span>
          <span class="lv-label">1年生</span>
        </button>
        <button class="level-btn" data-level="2" onclick="selectLevel(2)">
          <span class="lv-kanji">二</span>
          <span class="lv-label">2年生</span>
        </button>
        <button class="level-btn" data-level="3" onclick="selectLevel(3)">
          <span class="lv-kanji">三</span>
          <span class="lv-label">3年生</span>
        </button>
        <button class="level-btn" data-level="4" onclick="selectLevel(4)">
          <span class="lv-kanji">四</span>
          <span class="lv-label">4年生</span>
        </button>
        <button class="level-btn" data-level="5" onclick="selectLevel(5)">
          <span class="lv-kanji">五</span>
          <span class="lv-label">5年生</span>
        </button>
        <button class="level-btn" data-level="6" onclick="selectLevel(6)">
          <span class="lv-kanji">六</span>
          <span class="lv-label">6年生</span>
        </button>
      </div>
    </div>

    <button class="start-btn" id="start-btn" disabled onclick="startQuiz()">
      はじめる →
    </button>
    <div class="home-action-row">
      <button class="stats-open-btn" onclick="showScreen('stats-screen'); renderStats()">
        <span class="btn-icon">📊</span>
        <span>学習きろく</span>
        <span class="btn-sub" id="home-stats-sub">まだありません</span>
      </button>
      <button class="weak-open-btn disabled" id="home-weak-btn">
        <span class="btn-icon">🔥</span>
        <span>苦手ドリル</span>
        <span class="btn-sub" id="home-weak-sub">苦手漢字がまだありません</span>
      </button>
    </div>
  </div>

  <!-- ===== クイズ画面 ===== -->
  <div id="quiz-screen" class="screen">
    <div class="quiz-header">
      <span class="header-title" id="header-level-label">1年生</span>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <span class="progress-text" id="progress-text">0 / 30</span>
    </div>

    <div class="quiz-body">
      <!-- 問題カード -->
      <div class="question-card">
        <div class="question-hint">この読みかたの漢字を書こう！</div>
        <div class="question-reading" id="question-reading">―</div>
        <div class="question-meaning" id="question-meaning">意味の例</div>
        <div class="question-example" id="question-example" style="display:none">
          <span class="question-example-label">れいぶん</span>
          <span id="question-example-text"></span>
        </div>
      </div>

      <!-- 手書きキャンバス -->
      <div class="input-section">
        <span class="input-label">✏️ Apple Pencilで書こう</span>
        <div class="canvas-wrap" id="canvas-wrap">
          <canvas id="draw-canvas"></canvas>
          <svg class="canvas-guide" id="canvas-guide" xmlns="http://www.w3.org/2000/svg"></svg>
          <div class="answer-overlay" id="answer-overlay"></div>
        </div>
        <div class="loading-indicator" id="loading-indicator" style="display:none">
          <div class="spinner"></div>
          <span>判定中...</span>
        </div>
        <div class="input-actions">
          <button class="clear-btn" onclick="clearCanvas()">消す</button>
          <button class="submit-btn" id="submit-btn" onclick="submitAnswer()" disabled>答えを送る</button>
        </div>
      </div>

      <!-- 判定パネル（インライン） -->
      <div class="result-overlay" id="result-overlay">
        <div class="result-card">
          <div class="result-icon" id="result-icon">🎉</div>
          <div class="result-label" id="result-label">せいかい！</div>
          <div class="result-detail" id="result-detail"></div>
          <div class="result-answer" id="result-answer"></div>
          <button class="next-btn" id="next-btn" onclick="nextQuestion()">つぎへ →</button>
        </div>
      </div>
    </div>
  </div>

// ===== localStorage =====
const STORAGE_KEY = 'kanji_techo_v1';
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { history: [], weakWords: {} }; }
  catch { return { history: [], weakWords: {} }; }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

// ===== 状態 =====
let selectedLevel = null;
let currentQuestions = [];
let currentIndex = 0;
let correctCount = 0;
let wrongList = [];
let hasDrawn = false;
let isSubmitting = false;
let isWeakDrill = false;
let isDrawing = false;
let lastX = 0, lastY = 0;
let canvasInitialized = false;
let canvas, ctx;

// ===== キャンバス =====
function initCanvas() {
  canvas = document.getElementById('draw-canvas');
  const wrap = document.getElementById('canvas-wrap');
  const w = wrap.clientWidth;
  canvas.width = w;
  canvas.height = w;
  canvas.style.width = '100%';
  canvas.style.height = '100%';
  ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, w, w);
  drawGuide(w);
  ctx.strokeStyle = '#1a0f08';
  ctx.lineWidth = Math.max(6, w / 28);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (!canvasInitialized) {
    canvas.style.touchAction = 'none';
    canvas.addEventListener('pointerdown', e => { e.preventDefault(); startDraw(e); });
    canvas.addEventListener('pointermove', e => { e.preventDefault(); draw(e); });
    canvas.addEventListener('pointerup', endDraw);
    canvas.addEventListener('pointercancel', endDraw);
    canvas.addEventListener('pointerleave', endDraw);
    canvasInitialized = true;
  }
}



function drawGuide(w) {
  const guide = document.getElementById('canvas-guide');
  const h = w;
  guide.setAttribute('viewBox', `0 0 ${w} ${h}`);
  guide.setAttribute('width', w);
  guide.setAttribute('height', h);
  const cx = w / 2, cy = h / 2;
  const sc = '#e8ddd0';
  guide.innerHTML = `
    <line x1="${cx}" y1="10" x2="${cx}" y2="${h-10}" stroke="${sc}" stroke-width="1.5" stroke-dasharray="8,5"/>
    <line x1="10" y1="${cy}" x2="${w-10}" y2="${cy}" stroke="${sc}" stroke-width="1.5" stroke-dasharray="8,5"/>
    <line x1="10" y1="10" x2="${w-10}" y2="${h-10}" stroke="${sc}" stroke-width="1" stroke-dasharray="4,10"/>
    <line x1="${w-10}" y1="10" x2="10" y2="${h-10}" stroke="${sc}" stroke-width="1" stroke-dasharray="4,10"/>
    <rect x="8" y="8" width="${w-16}" height="${h-16}" fill="none" stroke="${sc}" stroke-width="2" rx="18"/>
  `;
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}

// 筆描画用の状態
let lastWidth = 8;
let lastPressure = 0.5;
let strokePoints = []; // はらい検知用に直近の座標を保持

function getPenWidth(pressure, canvasW) {
  const base = canvasW / 22;
  // 筆圧0.0〜1.0 → 幅をbase*0.2〜base*1.8 に大きく変化
  return Math.max(2, base * (0.2 + pressure * 1.6));
}

function startDraw(e) {
  isDrawing = true;
  canvas.setPointerCapture(e.pointerId);
  const pos = getPos(e);
  lastX = pos.x; lastY = pos.y;
  strokePoints = [pos];

  const p = (e.pointerType === 'pen' && e.pressure > 0) ? e.pressure : 0.5;
  lastPressure = p;
  const w = getPenWidth(p, canvas.width);
  lastWidth = w;

  // とめ：筆を置いた瞬間に少し大きめの点を打つ
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, w * 0.65, 0, Math.PI * 2);
  ctx.fillStyle = '#1a0f08';
  ctx.fill();

  hasDrawn = true;
  document.getElementById('submit-btn').disabled = false;
}

function draw(e) {
  if (!isDrawing) return;
  const pos = getPos(e);
  strokePoints.push(pos);
  if (strokePoints.length > 8) strokePoints.shift();

  const p = (e.pointerType === 'pen' && e.pressure > 0) ? e.pressure : 0.5;

  // 移動速度を計算（速いほど細く→はらいの表現）
  const dx = pos.x - lastX, dy = pos.y - lastY;
  const speed = Math.sqrt(dx*dx + dy*dy);
  const speedFactor = Math.max(0, 1 - speed / (canvas.width / 5));

  // 筆圧 × 速度で幅を決定
  const combinedPressure = p * (0.5 + speedFactor * 0.5);
  const targetW = getPenWidth(combinedPressure, canvas.width);

  // 急激な変化を抑えるスムージング
  const w = lastWidth * 0.6 + targetW * 0.4;
  lastWidth = w;
  lastPressure = p;

  // 太さが変わる線をtrapezoid（台形）で描いて毛筆感を出す
  const angle = Math.atan2(dy, dx);
  const perp = angle + Math.PI / 2;
  const hw = w / 2, lhw = lastWidth / 2;

  ctx.beginPath();
  ctx.moveTo(lastX + Math.cos(perp) * lhw, lastY + Math.sin(perp) * lhw);
  ctx.lineTo(pos.x  + Math.cos(perp) * hw,  pos.y  + Math.sin(perp) * hw);
  ctx.lineTo(pos.x  - Math.cos(perp) * hw,  pos.y  - Math.sin(perp) * hw);
  ctx.lineTo(lastX - Math.cos(perp) * lhw, lastY - Math.sin(perp) * lhw);
  ctx.closePath();
  ctx.fillStyle = '#1a0f08';
  ctx.fill();

  // 繋ぎ目を滑らかにする小円
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, hw * 0.85, 0, Math.PI * 2);
  ctx.fill();

  lastX = pos.x; lastY = pos.y;
}

function endDraw(e) {
  if (!isDrawing) return;
  isDrawing = false;

  // はらい：筆を離す直前の位置に向かって細くなる点を追加
  if (e && strokePoints.length >= 2 && lastPressure < 0.6) {
    const last = strokePoints[strokePoints.length - 1];
    const prev = strokePoints[strokePoints.length - 2];
    const dx = last.x - prev.x, dy = last.y - prev.y;
    // 進行方向に少し延ばして細い点を打つ
    const steps = 4;
    for (let i = 1; i <= steps; i++) {
      const t = i / steps;
      const x = last.x + dx * t * 0.6;
      const y = last.y + dy * t * 0.6;
      const r = (lastWidth / 2) * (1 - t) * 0.5;
      if (r < 1) break;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(26,15,8,${1 - t * 0.7})`;
      ctx.fill();
    }
  }
}

function clearCanvas() {
  if (!ctx) return;
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  hasDrawn = false;
  document.getElementById('submit-btn').disabled = true;
}

// ===== クイズ開始 =====
function startQuiz() {
  isWeakDrill = false;
  const all = KANJI_DATA[selectedLevel];
  const shuffled = [...all].sort(() => Math.random() - 0.5);
  currentQuestions = shuffled.slice(0, 10);
  currentIndex = 0;
  correctCount = 0;
  wrongList = [];

  document.getElementById('header-level-label').textContent = selectedLevel + '年生';
  showScreen('quiz-screen');
  initCanvas();
  showQuestion();
}

function startWeakDrill() {
  const d = loadData();
  const entries = Object.entries(d.weakWords || {});
  if (entries.length === 0) return;
  // 間違い回数が多い順に最大10問
  entries.sort((a, b) => b[1].count - a[1].count);
  const top = entries.slice(0, 10);
  // 漢字データから該当オブジェクトを取得
  const allKanji = Object.values(KANJI_DATA).flat();
  currentQuestions = top.map(([kanji]) => allKanji.find(k => k.kanji === kanji)).filter(Boolean);
  currentQuestions = currentQuestions.sort(() => Math.random() - 0.5);
  isWeakDrill = true;
  currentIndex = 0;
  correctCount = 0;
  wrongList = [];
  document.getElementById('header-level-label').textContent = '🔥 苦手ドリル';
  showScreen('quiz-screen');
  initCanvas();
  showQuestion();
}

function maskKanji(text, kanji) {
  // 答えの漢字を●に置換（1文字ずつ対応）
  return text.split('').map(ch => {
    if (ch === kanji) return '<span class="masked">●</span>';
    return ch;
  }).join('');
}

function showQuestion() {
  const q = currentQuestions[currentIndex];
  document.getElementById('question-reading').textContent = q.reading;
  // meaning 中の答え漢字をマスク
  document.getElementById('question-meaning').innerHTML = maskKanji(q.meaning, q.kanji);
  document.getElementById('progress-text').textContent = (currentIndex + 1) + ' / 10';
  document.getElementById('progress-bar').style.width = ((currentIndex + 1) / 10 * 100) + '%';

  // 例文表示（答えをマスク）
  if (q.example) {
    document.getElementById('question-example').style.display = 'block';
    document.getElementById('question-example-text').innerHTML = maskKanji(q.example, q.kanji);
  } else {
    document.getElementById('question-example').style.display = 'none';
  }

  clearCanvas();
  hasDrawn = false;
  isSubmitting = false;
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('loading-indicator').style.display = 'none';
}

  const imageData = offscreen.toDataURL('image/jpeg', 0.8).split(',')[1];
  const q = currentQuestions[currentIndex];

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': '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',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 150,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: 'image/jpeg', data: imageData }
            },
            {
              type: 'text',
              text: `手書きの漢字を判定してください。読み:「${q.reading}」 正解:「${q.kanji}」\n小学生が書いた手書き文字として、正解の漢字に見えるかどうかを判定してください。多少バランスが悪くても、線の数・形が合っていれば正解としてください。明らかに全く違う漢字の場合のみ不正解にしてください。\nJSON形式のみ: {"correct": true/false, "recognized": "読み取った文字", "comment": "短い日本語コメント（ひとこと応援も添えて）"}`
            }
          ]
        }]
      })
    });

    if (!response.ok) {
      const errJson = await response.json().catch(() => ({}));
      throw new Error(errJson?.error?.message || 'HTTP ' + response.status);
    }
    const data = await response.json();
    const text = data.content?.[0]?.text?.trim() || '';
    let result;
    try {
      const jsonMatch = text.match(/\{[\s\S]*?\}/);
      result = JSON.parse(jsonMatch ? jsonMatch[0] : text);
    } catch {
      result = { correct: false, recognized: '?', comment: '読み取れませんでした' };
    }
    showResult(result);
  } catch (err) {
    console.error('API Error:', err);
    // エラー詳細を表示してデバッグしやすくする
    const msg = err?.message || String(err);
    showResult({ correct: false, recognized: null, comment: `エラー: ${msg}` });
  }
}

function showResult(result) {
  document.getElementById('loading-indicator').style.display = 'none';
  const q = currentQuestions[currentIndex];

  // 正解文字をキャンバスに重ねて表示
  const ansOverlay = document.getElementById('answer-overlay');
  ansOverlay.textContent = q.kanji;
  ansOverlay.classList.add('show');

  // 判定パネル表示後にキャンバスを縮小
  const overlay = document.getElementById('result-overlay');
  const icon = document.getElementById('result-icon');
  const label = document.getElementById('result-label');
  const detail = document.getElementById('result-detail');
  const answer = document.getElementById('result-answer');

  const d = loadData();
  if (result.correct) {
    correctCount++;
    icon.textContent = '🎉';
    label.textContent = 'せいかい！';
    label.className = 'result-label correct';
    detail.textContent = result.comment || 'よくできました！';
    // 苦手から1回分減らす
    if (d.weakWords[q.kanji]) {
      d.weakWords[q.kanji].count--;
      if (d.weakWords[q.kanji].count <= 0) delete d.weakWords[q.kanji];
      saveData(d);
    }
  } else {
    wrongList.push(q);
    icon.textContent = '😢';
    label.textContent = 'もう少し！';
    label.className = 'result-label wrong';
    const validRecognized = result.recognized && result.recognized !== '?';
    detail.textContent = validRecognized
      ? `書いた文字:「${result.recognized}」 / ${result.comment || ''}`
      : result.comment || 'もう一度練習してみよう';
    // 苦手に追加
    if (!d.weakWords[q.kanji]) d.weakWords[q.kanji] = { reading: q.reading, count: 0 };
    d.weakWords[q.kanji].count++;
    saveData(d);
  }
  answer.textContent = '正解: ' + q.kanji;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = currentIndex < 9 ? 'つぎへ →' : '結果をみる';
  overlay.classList.add('show');

}

function nextQuestion() {
  document.getElementById('result-overlay').classList.remove('show');
  // 正解オーバーレイをリセット
  const ao = document.getElementById('answer-overlay');
  ao.classList.remove('show');
  ao.textContent = '';
  currentIndex++;
  if (currentIndex >= 10) {
    showFinalResult();
  } else {
    showQuestion();
  }
}

function showFinalResult() {
  const total = currentQuestions.length;
  showScreen('result-screen');
  document.getElementById('score-num').textContent = correctCount;
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent = total - correctCount;

  const pct = correctCount / total;
  let icon = '🏆', title = 'すばらしい！';
  if (pct < 0.5) { icon = '📚'; title = 'もっと練習しよう！'; }
  else if (pct < 0.7) { icon = '💪'; title = 'よくがんばった！'; }
  else if (pct < 0.9) { icon = '⭐'; title = 'なかなかいい！'; }
  document.getElementById('final-icon').textContent = icon;
  document.getElementById('final-title').textContent = title;

  const wrongSection = document.getElementById('wrong-list-section');
  const wrongListEl = document.getElementById('wrong-list');
  if (wrongList.length > 0) {
    wrongSection.style.display = 'block';
    wrongListEl.innerHTML = wrongList.map(q =>
      `<div class="wrong-item">
        <span>${q.kanji}</span>
        <span class="wrong-item-reading">${q.reading}</span>
      </div>`
    ).join('');
  } else {
    wrongSection.style.display = 'none';
  }

  // 通常ドリルのみ履歴保存
  if (!isWeakDrill) {
    const d = loadData();
    d.history = d.history || [];
    d.history.unshift({
      date: new Date().toLocaleDateString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }),
      level: selectedLevel,
      score: correctCount,
      total
    });
    if (d.history.length > 20) d.history = d.history.slice(0, 20);
    saveData(d);
  }

  // 苦手ドリルボタン更新
  const d2 = loadData();
  const wc = Object.keys(d2.weakWords || {}).length;
  const rwb = document.getElementById('result-weak-btn');
  if (wc === 0) {
    rwb.classList.add('disabled');
    rwb.onclick = null;
  } else {
    rwb.classList.remove('disabled');
    rwb.onclick = startWeakDrill;
  }
  updateHomeButtons();
}

function retryQuiz() {
  if (isWeakDrill) { startWeakDrill(); }
  else { startQuiz(); }
}
function goHome() { showScreen('start-screen'); updateHomeButtons(); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== ホームボタン更新 =====
function updateHomeButtons() {
  const d = loadData();
  const wc = Object.keys(d.weakWords || {}).length;
  const hwb = document.getElementById('home-weak-btn');
  const hws = document.getElementById('home-weak-sub');
  if (wc === 0) {
    hwb.classList.add('disabled');
    hwb.onclick = null;
    hws.textContent = '苦手漢字がまだありません';
  } else {
    hwb.classList.remove('disabled');
    hwb.onclick = startWeakDrill;
    hws.textContent = Math.min(wc, 10) + '問';
  }
  const hss = document.getElementById('home-stats-sub');
  hss.textContent = d.history && d.history.length > 0 ? d.history.length + '件の記録' : 'まだありません';
}

// ===== 記録画面レンダリング =====
function renderStats() {
  const d = loadData();
  const hist = d.history || [];
  const weak = d.weakWords || {};

  // サマリー
  const totalDrills = hist.length;
  const totalCorrect = hist.reduce((s, h) => s + h.score, 0);
  const totalQ = hist.reduce((s, h) => s + h.total, 0);
  document.getElementById('stat-total').textContent = totalDrills;
  document.getElementById('stat-correct').textContent = totalCorrect;
  document.getElementById('stat-rate').textContent = totalQ > 0 ? Math.round(totalCorrect / totalQ * 100) + '%' : '0%';

  // 苦手リスト
  const weakEntries = Object.entries(weak).sort((a, b) => b[1].count - a[1].count);
  const grid = document.getElementById('stats-weak-grid');
  const empty = document.getElementById('stats-weak-empty');
  const drillBtn = document.getElementById('stats-weak-drill-btn');
  if (weakEntries.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    drillBtn.classList.add('disabled');
    drillBtn.onclick = null;
  } else {
    empty.style.display = 'none';
    grid.innerHTML = weakEntries.map(([kanji, info]) =>
      `<div class="weak-chip">
        <span class="weak-chip-kanji">${kanji}</span>
        <span class="weak-chip-reading">${info.reading}</span>
        <span class="weak-chip-count">✕${info.count}</span>
      </div>`
    ).join('');
    drillBtn.classList.remove('disabled');
    drillBtn.onclick = startWeakDrill;
  }

  // 履歴
  const histList = document.getElementById('stats-history-list');
  if (hist.length === 0) {
    histList.innerHTML = '<div style="font-size:13px;color:#b5a08a">記録がありません</div>';
  } else {
    histList.innerHTML = hist.map(h => `
      <div class="history-item">
        <span class="history-lv">${h.level}年生</span>
        <span class="history-date">${h.date}</span>
        <span class="history-score">${h.score}/${h.total}</span>
      </div>`).join('');
  }
}

function clearAllStats() {
  localStorage.removeItem(STORAGE_KEY);
  renderStats();
  updateHomeButtons();
}

// 起動時に更新
updateHomeButtons();
</script>
</body>
</html>
