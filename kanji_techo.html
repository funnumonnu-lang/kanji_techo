<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>かんじ手帳</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #faf7f2;
      font-family: 'Zen Maru Gothic', 'Noto Sans JP', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    #app {
      max-width: 480px;
      min-height: 100dvh;
      margin: 0 auto;
      background: #faf7f2;
      display: flex;
      flex-direction: column;
    }
    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; min-height: 100dvh; }

    /* ===== START SCREEN ===== */
    #start-screen {
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 40px 24px;
    }
    .app-icon { font-size: 80px; line-height: 1; }
    .app-title {
      font-size: 38px; font-weight: 900;
      color: #2d2016;
      text-align: center;
      letter-spacing: 0.06em;
    }
    .app-sub {
      font-size: 14px; color: #8b7355;
      text-align: center; line-height: 1.6;
    }
    .level-section {
      width: 100%;
    }
    .level-label {
      font-size: 11px; font-weight: 700; color: #b5a08a;
      letter-spacing: 0.12em; margin-bottom: 10px;
      display: block;
    }
    .level-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .level-btn {
      background: #fff;
      border: 2px solid #e8ddd0;
      border-radius: 14px;
      padding: 14px 8px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      display: flex; flex-direction: column; gap: 4px; align-items: center;
      -webkit-appearance: none;
    }
    .level-btn:active { transform: scale(0.96); }
    .level-btn.selected {
      border-color: #c0561e;
      background: #fff5f0;
    }
    .lv-kanji {
      font-size: 22px; font-weight: 900;
      color: #2d2016;
    }
    .lv-label {
      font-size: 11px; color: #8b7355;
      font-weight: 700;
    }
    .start-btn {
      background: #c0561e;
      color: #fff;
      border: none;
      border-radius: 18px;
      padding: 18px 0;
      width: 100%;
      font-size: 18px;
      font-weight: 900;
      font-family: 'Zen Maru Gothic', sans-serif;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: transform 0.1s, opacity 0.1s;
    }
    .start-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .start-btn:not(:disabled):active { transform: scale(0.97); }

    /* ===== QUIZ SCREEN ===== */
    #quiz-screen { flex: 1; }

    .quiz-header {
      background: #2d2016;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-title {
      font-size: 13px; font-weight: 700;
      color: #d4b896;
      letter-spacing: 0.08em;
    }
    .progress-wrap {
      flex: 1;
      background: rgba(255,255,255,0.15);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #e8874a;
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-text {
      font-size: 13px; font-weight: 700;
      color: #d4b896;
      min-width: 48px;
      text-align: right;
    }

    .quiz-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 20px 16px;
      gap: 14px;
    }

    /* 問題カード */
    .question-card {
      background: #fff;
      border-radius: 20px;
      padding: 24px 20px 20px;
      box-shadow: 0 2px 12px rgba(45,32,22,0.08);
      text-align: center;
    }
    .question-hint {
      font-size: 11px; font-weight: 700;
      color: #c0561e;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .question-reading {
      font-size: 32px; font-weight: 900;
      color: #2d2016;
      letter-spacing: 0.06em;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .question-meaning {
      font-size: 14px; color: #8b7355;
      font-weight: 500;
      line-height: 1.5;
    }
    .question-example {
      font-size: 15px; color: #4a3825;
      font-weight: 700;
      line-height: 1.6;
      background: #fdf5ec;
      border-left: 3px solid #e8874a;
      border-radius: 8px;
      padding: 8px 12px;
      margin-top: 6px;
      text-align: left;
    }
    .question-example-label {
      font-size: 10px; color: #c0561e;
      font-weight: 700; letter-spacing: 0.1em;
      display: block; margin-bottom: 2px;
    }
    .masked {
      display: inline-block;
      background: #2d2016;
      color: #2d2016;
      border-radius: 3px;
      min-width: 1em;
      line-height: 1;
    }

    /* 入力エリア（Scribble対応） */
    .input-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .input-label {
      font-size: 11px; font-weight: 700;
      color: #b5a08a;
      letter-spacing: 0.1em;
    }
    .scribble-wrap {
      position: relative;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 2px 12px rgba(45,32,22,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 18px 16px 14px;
      gap: 10px;
      min-height: 160px;
    }
    /* 漢字練習帳の格子ガイド（背景） */
    .scribble-wrap::before {
      content: '';
      position: absolute;
      inset: 12px;
      border: 2px solid #e8ddd0;
      border-radius: 10px;
      pointer-events: none;
    }
    .scribble-wrap::after {
      content: '';
      position: absolute;
      top: 12px; bottom: 12px;
      left: 50%; width: 0;
      border-left: 1px dashed #e8ddd0;
      pointer-events: none;
    }
    .scribble-hline {
      position: absolute;
      left: 12px; right: 12px;
      top: 50%; height: 0;
      border-top: 1px dashed #e8ddd0;
      pointer-events: none;
    }
    #kanji-input {
      position: relative;
      width: 100%;
      max-width: 200px;
      text-align: center;
      font-size: 72px;
      font-weight: 900;
      font-family: 'Zen Maru Gothic', 'Noto Sans JP', sans-serif;
      color: #2d2016;
      background: transparent;
      border: none;
      outline: none;
      caret-color: #c0561e;
      line-height: 1.1;
      /* Scribble が働くよう -webkit-user-select は auto のまま */
      -webkit-user-select: auto;
      z-index: 1;
    }
    #kanji-input::placeholder {
      color: #d4c4b0;
      font-size: 48px;
    }
    .pencil-hint {
      font-size: 12px; color: #b5a08a;
      font-weight: 500;
      display: flex; align-items: center; gap: 4px;
      z-index: 1;
    }
    .input-actions {
      display: flex;
      gap: 10px;
    }
    .clear-btn {
      flex: 1;
      background: #f3ede6;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 14px;
      font-weight: 700;
      color: #8b7355;
      cursor: pointer;
      font-family: 'Zen Maru Gothic', sans-serif;
      transition: background 0.15s;
    }
    .clear-btn:active { background: #e8ddd0; }
    .submit-btn {
      flex: 2;
      background: #c0561e;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      font-family: 'Zen Maru Gothic', sans-serif;
      letter-spacing: 0.06em;
      transition: opacity 0.15s;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .submit-btn:not(:disabled):active { opacity: 0.85; }

    /* 判定オーバーレイ */
    .result-overlay {
      position: fixed;
      inset: 0;
      background: rgba(45,32,22,0.55);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .result-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .result-card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 28px 28px 0 0;
      padding: 28px 24px 40px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .result-overlay.show .result-card {
      transform: translateY(0);
    }
    .result-icon {
      font-size: 56px;
      text-align: center;
      margin-bottom: 10px;
    }
    .result-label {
      font-size: 22px; font-weight: 900;
      text-align: center;
      margin-bottom: 6px;
    }
    .result-label.correct { color: #1a7a3e; }
    .result-label.wrong { color: #c0561e; }
    .result-detail {
      font-size: 14px; color: #8b7355;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .result-answer {
      font-size: 36px; font-weight: 900;
      text-align: center;
      color: #2d2016;
      margin-bottom: 20px;
    }
    .next-btn {
      width: 100%;
      background: #2d2016;
      border: none;
      border-radius: 16px;
      padding: 18px;
      font-size: 16px;
      font-weight: 900;
      color: #faf7f2;
      cursor: pointer;
      font-family: 'Zen Maru Gothic', sans-serif;
      letter-spacing: 0.08em;
      transition: opacity 0.15s;
    }
    .next-btn:active { opacity: 0.85; }

    /* ===== RESULT SCREEN ===== */
    #result-screen {
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 24px;
    }
    .final-icon { font-size: 80px; line-height: 1; }
    .final-title {
      font-size: 28px; font-weight: 900;
      color: #2d2016;
      text-align: center;
    }
    .score-card {
      background: #fff;
      border-radius: 22px;
      padding: 28px 40px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(45,32,22,0.1);
      width: 100%;
    }
    .score-num {
      font-size: 64px; font-weight: 900;
      color: #c0561e;
      line-height: 1;
    }
    .score-sub {
      font-size: 14px; color: #8b7355;
      font-weight: 700;
      margin-top: 6px;
    }
    .score-breakdown {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 14px;
    }
    .score-item {
      display: flex; flex-direction: column;
      gap: 4px; align-items: center;
    }
    .score-item-num {
      font-size: 24px; font-weight: 900;
    }
    .score-item-num.ok { color: #1a7a3e; }
    .score-item-num.ng { color: #c0561e; }
    .score-item-label {
      font-size: 11px; color: #b5a08a;
      font-weight: 700; letter-spacing: 0.1em;
    }
    .wrong-list-section { width: 100%; }
    .wrong-list-title {
      font-size: 12px; font-weight: 700;
      color: #b5a08a; letter-spacing: 0.1em;
      margin-bottom: 10px;
    }
    .wrong-list {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .wrong-item {
      background: #fff;
      border: 2px solid #f3ede6;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 16px; font-weight: 700;
      color: #2d2016;
      display: flex; flex-direction: column;
      align-items: center; gap: 2px;
    }
    .wrong-item-reading {
      font-size: 10px; color: #b5a08a; font-weight: 500;
    }
    .retry-btn {
      width: 100%;
      background: #c0561e;
      border: none;
      border-radius: 18px;
      padding: 18px;
      font-size: 17px; font-weight: 900;
      color: #fff;
      cursor: pointer;
      font-family: 'Zen Maru Gothic', sans-serif;
      letter-spacing: 0.08em;
      transition: opacity 0.15s;
    }
    .retry-btn:active { opacity: 0.85; }
    .home-btn {
      background: none;
      border: 2px solid #e8ddd0;
      border-radius: 18px;
      padding: 16px;
      width: 100%;
      font-size: 15px; font-weight: 700;
      color: #8b7355;
      cursor: pointer;
      font-family: 'Zen Maru Gothic', sans-serif;
      transition: background 0.15s;
    }
    .home-btn:active { background: #f3ede6; }

    /* ローディング */
    .loading-indicator {
      display: flex; align-items: center;
      gap: 8px;
      font-size: 13px; color: #b5a08a;
      font-weight: 700;
      justify-content: center;
      padding: 4px 0;
      min-height: 22px;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #e8ddd0;
      border-top-color: #c0561e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app">

  <!-- ===== スタート画面 ===== -->
  <div id="start-screen" class="screen active">
    <div class="app-icon">📖</div>
    <div>
      <div class="app-title">かんじ手帳</div>
      <div class="app-sub">Apple Pencilで漢字を練習しよう<br>1セット10問</div>
    </div>

    <div class="level-section">
      <span class="level-label">LEVEL を選ぼう</span>
      <div class="level-grid">
        <button class="level-btn" data-level="1" onclick="selectLevel(1)">
          <span class="lv-kanji">一</span>
          <span class="lv-label">1年生</span>
        </button>
        <button class="level-btn" data-level="2" onclick="selectLevel(2)">
          <span class="lv-kanji">二</span>
          <span class="lv-label">2年生</span>
        </button>
        <button class="level-btn" data-level="3" onclick="selectLevel(3)">
          <span class="lv-kanji">三</span>
          <span class="lv-label">3年生</span>
        </button>
        <button class="level-btn" data-level="4" onclick="selectLevel(4)">
          <span class="lv-kanji">四</span>
          <span class="lv-label">4年生</span>
        </button>
        <button class="level-btn" data-level="5" onclick="selectLevel(5)">
          <span class="lv-kanji">五</span>
          <span class="lv-label">5年生</span>
        </button>
        <button class="level-btn" data-level="6" onclick="selectLevel(6)">
          <span class="lv-kanji">六</span>
          <span class="lv-label">6年生</span>
        </button>
      </div>
    </div>

    <button class="start-btn" id="start-btn" disabled onclick="startQuiz()">
      はじめる →
    </button>
  </div>

  <!-- ===== クイズ画面 ===== -->
  <div id="quiz-screen" class="screen">
    <div class="quiz-header">
      <span class="header-title" id="header-level-label">1年生</span>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <span class="progress-text" id="progress-text">0 / 30</span>
    </div>

    <div class="quiz-body">
      <!-- 問題カード -->
      <div class="question-card">
        <div class="question-hint">この読みかたの漢字を書こう！</div>
        <div class="question-reading" id="question-reading">―</div>
        <div class="question-meaning" id="question-meaning">意味の例</div>
        <div class="question-example" id="question-example" style="display:none">
          <span class="question-example-label">れいぶん</span>
          <span id="question-example-text"></span>
        </div>
      </div>

      <!-- Scribble入力エリア -->
      <div class="input-section">
        <span class="input-label">✏️ Apple Pencilで書こう</span>
        <div class="scribble-wrap">
          <div class="scribble-hline"></div>
          <input
            id="kanji-input"
            type="text"
            inputmode="text"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
            placeholder="漢字"
            oninput="onInputChange()"
          />
          <span class="pencil-hint">🍎 Scribbleで自動変換されます</span>
        </div>
        <div class="loading-indicator" id="loading-indicator" style="display:none">
          <div class="spinner"></div>
          <span>判定中...</span>
        </div>
        <div class="input-actions">
          <button class="clear-btn" onclick="clearInput()">消す</button>
          <button class="submit-btn" id="submit-btn" onclick="submitAnswer()" disabled>答えを送る</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 判定オーバーレイ -->
  <div class="result-overlay" id="result-overlay">
    <div class="result-card">
      <div class="result-icon" id="result-icon">🎉</div>
      <div class="result-label" id="result-label">せいかい！</div>
      <div class="result-detail" id="result-detail"></div>
      <div class="result-answer" id="result-answer"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">つぎへ →</button>
    </div>
  </div>

  <!-- ===== 結果画面 ===== -->
  <div id="result-screen" class="screen">
    <div class="final-icon" id="final-icon">🏆</div>
    <div class="final-title" id="final-title">おわり！</div>
    <div class="score-card">
      <div class="score-num" id="score-num">0</div>
      <div class="score-sub">/ 10問 せいかい</div>
      <div class="score-breakdown">
        <div class="score-item">
          <span class="score-item-num ok" id="correct-count">0</span>
          <span class="score-item-label">せいかい</span>
        </div>
        <div class="score-item">
          <span class="score-item-num ng" id="wrong-count">0</span>
          <span class="score-item-label">まちがい</span>
        </div>
      </div>
    </div>
    <div class="wrong-list-section" id="wrong-list-section" style="display:none">
      <div class="wrong-list-title">まちがえた漢字</div>
      <div class="wrong-list" id="wrong-list"></div>
    </div>
    <button class="retry-btn" onclick="retryQuiz()">もう一度やる 🔄</button>
    <button class="home-btn" onclick="goHome()">レベル選択へ</button>
  </div>

</div>

<script>
// ===== 単語データ =====
const KANJI_DATA = {
  1: [
    { kanji: "山", reading: "やま", meaning: "高くそびえる地形", example: "あの●は雪がつもっている。" },
    { kanji: "川", reading: "かわ", meaning: "流れる水の道", example: "●に魚がたくさんいる。" },
    { kanji: "火", reading: "ひ", meaning: "燃えて光るもの", example: "キャンプで●をおこした。" },
    { kanji: "水", reading: "みず", meaning: "飲める透明な液体", example: "●をコップに注ぐ。" },
    { kanji: "木", reading: "き", meaning: "幹と葉のある植物", example: "公園の●に鳥がとまった。" },
    { kanji: "土", reading: "つち", meaning: "地面をつくるもの", example: "●に種をまく。" },
    { kanji: "日", reading: "にち・ひ", meaning: "太陽・一日のこと", example: "今●は晴れている。" },
    { kanji: "月", reading: "つき", meaning: "夜空に光る天体", example: "丸い●が空に浮かんでいる。" },
    { kanji: "金", reading: "きん", meaning: "光る貴重な金属", example: "●メダルをとる。" },
    { kanji: "人", reading: "ひと", meaning: "人間のこと", example: "駅にたくさんの●がいる。" },
    { kanji: "口", reading: "くち", meaning: "食べる・話すところ", example: "●を大きくあけて歌う。" },
    { kanji: "手", reading: "て", meaning: "物をつかむ体の部分", example: "●を洗ってから食べる。" },
    { kanji: "目", reading: "め", meaning: "見るための器官", example: "●を細めて遠くを見る。" },
    { kanji: "耳", reading: "みみ", meaning: "聞くための器官", example: "●をすませて音楽を聴く。" },
    { kanji: "足", reading: "あし", meaning: "歩くための体の部分", example: "●が速い選手が一位になった。" },
    { kanji: "大", reading: "おお（きい）", meaning: "サイズがとても大きい", example: "●きな犬が走ってきた。" },
    { kanji: "小", reading: "ちい（さい）", meaning: "サイズがとても小さい", example: "●さな虫を見つけた。" },
    { kanji: "中", reading: "なか", meaning: "まんなか・内側", example: "箱の●におもちゃが入っている。" },
    { kanji: "上", reading: "うえ", meaning: "高いところ", example: "棚の●に本がある。" },
    { kanji: "下", reading: "した", meaning: "低いところ", example: "テーブルの●に猫がいる。" },
    { kanji: "右", reading: "みぎ", meaning: "右の方向", example: "●に曲がると公園がある。" },
    { kanji: "左", reading: "ひだり", meaning: "左の方向", example: "●手でボールをとった。" },
    { kanji: "円", reading: "えん", meaning: "丸い形・お金の単位", example: "このりんごは百●です。" },

    { kanji: "巻", reading: "ま（く）", meaning: "巻くこと・冊のこと", example: "包帯を足首に●いた。" },
    { kanji: "看", reading: "かん", meaning: "見守ること・看護のこと", example: "●護師が患者を助けた。" },
    { kanji: "簡", reading: "かん", meaning: "簡単・シンプルなこと", example: "●単な問題から始めた。" },
    { kanji: "危", reading: "あぶ（ない）", meaning: "危険な状態のこと", example: "●険なので近づかないで。" },
    { kanji: "机", reading: "つくえ", meaning: "勉強や作業用の台", example: "●の上を片付けた。" },
    { kanji: "揮", reading: "き", meaning: "振るう・指揮すること", example: "指●者がタクトを振った。" },
    { kanji: "貴", reading: "たか（い）", meaning: "価値がとても高いこと", example: "●重な体験ができた。" },
    { kanji: "疑", reading: "うたが（う）", meaning: "疑問に思うこと", example: "その話を●わしく思った。" },
    { kanji: "吸", reading: "す（う）", meaning: "空気などを吸うこと", example: "深呼●して落ち着いた。" },
    { kanji: "供", reading: "そな（える）", meaning: "提供すること・子供", example: "神様にお●えをした。" },
    { kanji: "胸", reading: "むね", meaning: "体の前側・心のこと", example: "発表前は●がドキドキした。" },
    { kanji: "郷", reading: "きょう", meaning: "故郷・ふるさとのこと", example: "故●の味を懐かしむ。" },
    { kanji: "勤", reading: "つと（める）", meaning: "仕事をすること", example: "父は会社に●めている。" },
    { kanji: "筋", reading: "すじ", meaning: "筋肉・道筋のこと", example: "●トレで体を鍛える。" },
    { kanji: "系", reading: "けい", meaning: "つながり・系列のこと", example: "太陽●の惑星を調べた。" },
    { kanji: "敬", reading: "うやま（う）", meaning: "尊敬すること", example: "お年寄りを●う気持ちを持つ。" },
    { kanji: "警", reading: "けい", meaning: "警告・警察のこと", example: "●察官が事故を処理した。" },
    { kanji: "劇", reading: "げき", meaning: "演劇・激しいこと", example: "学芸会で●を上演した。" },
    { kanji: "激", reading: "はげ（しい）", meaning: "非常に強いこと", example: "●しい雨が降り続いた。" },
    { kanji: "穴", reading: "あな", meaning: "くぼんだ空間のこと", example: "地面に深い●が開いていた。" },
    { kanji: "絹", reading: "きぬ", meaning: "なめらかで高級な布", example: "●のスカーフを首に巻いた。" },
  ]
};

// ===== 状態 =====

// ===== 状態 =====
let selectedLevel = null;
let currentQuestions = [];
let currentIndex = 0;
let correctCount = 0;
let wrongList = [];
let hasInput = false;
let isSubmitting = false;

// ===== テキスト入力 =====
function onInputChange() {
  const val = document.getElementById('kanji-input').value.trim();
  hasInput = val.length > 0;
  document.getElementById('submit-btn').disabled = !hasInput;
}

function clearInput() {
  document.getElementById('kanji-input').value = '';
  hasInput = false;
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('kanji-input').focus();
}

// ===== レベル選択 =====
function selectLevel(level) {
  selectedLevel = level;
  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.level) === level);
  });
  document.getElementById('start-btn').disabled = false;
}

// ===== クイズ開始 =====
function startQuiz() {
  const all = KANJI_DATA[selectedLevel];
  const shuffled = [...all].sort(() => Math.random() - 0.5);
  currentQuestions = shuffled.slice(0, 10);
  currentIndex = 0;
  correctCount = 0;
  wrongList = [];

  document.getElementById('header-level-label').textContent = selectedLevel + '年生';
  showScreen('quiz-screen');
  showQuestion();
}

function maskKanji(text, kanji) {
  // 答えの漢字を●に置換（1文字ずつ対応）
  return text.split('').map(ch => {
    if (ch === kanji) return '<span class="masked">●</span>';
    return ch;
  }).join('');
}

function showQuestion() {
  const q = currentQuestions[currentIndex];
  document.getElementById('question-reading').textContent = q.reading;
  // meaning 中の答え漢字をマスク
  document.getElementById('question-meaning').innerHTML = maskKanji(q.meaning, q.kanji);
  document.getElementById('progress-text').textContent = (currentIndex + 1) + ' / 10';
  document.getElementById('progress-bar').style.width = ((currentIndex + 1) / 10 * 100) + '%';

  // 例文表示（答えをマスク）
  if (q.example) {
    document.getElementById('question-example').style.display = 'block';
    document.getElementById('question-example-text').innerHTML = maskKanji(q.example, q.kanji);
  } else {
    document.getElementById('question-example').style.display = 'none';
  }

  clearInput();
  hasInput = false;
  isSubmitting = false;
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('loading-indicator').style.display = 'none';
  setTimeout(() => { const inp = document.getElementById('kanji-input'); if(inp) inp.focus(); }, 100);
}

// ===== 答え送信 =====
async function submitAnswer() {
  if (!hasInput || isSubmitting) return;
  isSubmitting = true;
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('loading-indicator').style.display = 'flex';

  const inputText = document.getElementById('kanji-input').value.trim();
  const q = currentQuestions[currentIndex];

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 150,
        messages: [{
          role: 'user',
          content: [{
            type: 'text',
            text: `漢字の正誤判定をしてください。\n読み:「${q.reading}」 正解:「${q.kanji}」 回答:「${inputText}」\nJSON形式のみ: {"correct": true/false, "comment": "短い日本語コメント"}`
          }]
        }]
      })
    });

    if (!response.ok) {
      const errJson = await response.json().catch(() => ({}));
      throw new Error(errJson?.error?.message || 'HTTP ' + response.status);
    }
    const data = await response.json();
    const text = data.content?.[0]?.text?.trim() || '';
    let result;
    try {
      const jsonMatch = text.match(/\{[\s\S]*?\}/);
      result = JSON.parse(jsonMatch ? jsonMatch[0] : text);
    } catch {
      result = { correct: inputText === q.kanji, comment: inputText === q.kanji ? 'せいかい！' : 'もう一度' };
    }
    result.recognized = inputText;
    showResult(result);
  } catch (err) {
    console.error('API Error:', err);
    const correct = inputText === q.kanji;
    showResult({ correct, recognized: inputText, comment: correct ? 'せいかい！' : `正解は「${q.kanji}」` });
  }
}

function showResult(result) {
  document.getElementById('loading-indicator').style.display = 'none';
  const q = currentQuestions[currentIndex];
  const overlay = document.getElementById('result-overlay');
  const icon = document.getElementById('result-icon');
  const label = document.getElementById('result-label');
  const detail = document.getElementById('result-detail');
  const answer = document.getElementById('result-answer');

  if (result.correct) {
    correctCount++;
    icon.textContent = '🎉';
    label.textContent = 'せいかい！';
    label.className = 'result-label correct';
    detail.textContent = result.comment || 'よくできました！';
  } else {
    wrongList.push(q);
    icon.textContent = '😢';
    label.textContent = 'もう少し！';
    label.className = 'result-label wrong';
    detail.textContent = result.recognized
      ? `書いた文字:「${result.recognized}」 / ${result.comment || ''}`
      : result.comment || 'もう一度練習してみよう';
  }
  answer.textContent = '正解: ' + q.kanji;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = currentIndex < 9 ? 'つぎへ →' : '結果をみる';
  overlay.classList.add('show');
}

function nextQuestion() {
  document.getElementById('result-overlay').classList.remove('show');
  currentIndex++;
  if (currentIndex >= 10) {
    showFinalResult();
  } else {
    showQuestion();
  }
}

function showFinalResult() {
  showScreen('result-screen');
  document.getElementById('score-num').textContent = correctCount;
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent = 10 - correctCount;

  const pct = correctCount / 10;
  let icon = '🏆', title = 'すばらしい！';
  if (pct < 0.5) { icon = '📚'; title = 'もっと練習しよう！'; }
  else if (pct < 0.7) { icon = '💪'; title = 'よくがんばった！'; }
  else if (pct < 0.9) { icon = '⭐'; title = 'なかなかいい！'; }
  document.getElementById('final-icon').textContent = icon;
  document.getElementById('final-title').textContent = title;

  const wrongSection = document.getElementById('wrong-list-section');
  const wrongListEl = document.getElementById('wrong-list');
  if (wrongList.length > 0) {
    wrongSection.style.display = 'block';
    wrongListEl.innerHTML = wrongList.map(q =>
      `<div class="wrong-item">
        <span>${q.kanji}</span>
        <span class="wrong-item-reading">${q.reading}</span>
      </div>`
    ).join('');
  } else {
    wrongSection.style.display = 'none';
  }
}

function retryQuiz() { startQuiz(); }
function goHome() { showScreen('start-screen'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
