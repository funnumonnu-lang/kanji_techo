<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>かんじ手帳</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #faf7f2;
      font-family: 'Zen Maru Gothic', 'Noto Sans JP', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    #app {
      max-width: 480px;
      min-height: 100dvh;
      margin: 0 auto;
      background: #faf7f2;
      display: flex;
      flex-direction: column;
    }
    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; min-height: 100dvh; }

    /* ===== START SCREEN ===== */
    #start-screen {
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 40px 24px;
    }
    .app-icon { font-size: 80px; line-height: 1; }
    .app-title {
      font-size: 38px; font-weight: 900;
      color: #2d2016;
      text-align: center;
      letter-spacing: 0.06em;
    }
    .app-sub {
      font-size: 14px; color: #8b7355;
      text-align: center; line-height: 1.6;
    }
    .level-section {
      width: 100%;
    }
    .level-label {
      font-size: 11px; font-weight: 700; color: #b5a08a;
      letter-spacing: 0.12em; margin-bottom: 10px;
      display: block;
    }
    .level-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .level-btn {
      background: #fff;
      border: 2px solid #e8ddd0;
      border-radius: 14px;
      padding: 14px 8px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      display: flex; flex-direction: column; gap: 4px; align-items: center;
      -webkit-appearance: none;
    }
    .level-btn:active { transform: scale(0.96); }
    .level-btn.selected {
      border-color: #c0561e;
      background: #fff5f0;
    }
    .lv-kanji {
      font-size: 22px; font-weight: 900;
      color: #2d2016;
    }
    .lv-label {
      font-size: 11px; color: #8b7355;
      font-weight: 700;
    }
    .start-btn {
      background: #c0561e;
      color: #fff;
      border: none;
      border-radius: 18px;
      padding: 18px 0;
      width: 100%;
      font-size: 18px;
      font-weight: 900;
      font-family: 'Zen Maru Gothic', sans-serif;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: transform 0.1s, opacity 0.1s;
    }
    .start-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .start-btn:not(:disabled):active { transform: scale(0.97); }

    /* ===== QUIZ SCREEN ===== */
    #quiz-screen { flex: 1; }

    .quiz-header {
      background: #2d2016;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-title {
      font-size: 13px; font-weight: 700;
      color: #d4b896;
      letter-spacing: 0.08em;
    }
    .progress-wrap {
      flex: 1;
      background: rgba(255,255,255,0.15);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #e8874a;
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-text {
      font-size: 13px; font-weight: 700;
      color: #d4b896;
      min-width: 48px;
      text-align: right;
    }

    .quiz-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 20px 16px;
      gap: 14px;
    }

    /* 問題カード */
    .question-card {
      background: #fff;
      border-radius: 20px;
      padding: 24px 20px 20px;
      box-shadow: 0 2px 12px rgba(45,32,22,0.08);
      text-align: center;
    }
    .question-hint {
      font-size: 11px; font-weight: 700;
      color: #c0561e;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .question-reading {
      font-size: 32px; font-weight: 900;
      color: #2d2016;
      letter-spacing: 0.06em;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .question-meaning {
      font-size: 14px; color: #8b7355;
      font-weight: 500;
      line-height: 1.5;
    }

    /* 手書きエリア */
    .canvas-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .canvas-label {
      font-size: 11px; font-weight: 700;
      color: #b5a08a;
      letter-spacing: 0.1em;
    }
    .canvas-wrap {
      position: relative;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(45,32,22,0.08);
      overflow: hidden;
    }
    #draw-canvas {
      display: block;
      width: 100%;
      cursor: crosshair;
      touch-action: none;
    }
    /* 罫線（漢字練習帳風） */
    .canvas-guide {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }

    .canvas-actions {
      display: flex;
      gap: 10px;
    }
    .clear-btn {
      flex: 1;
      background: #f3ede6;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 14px;
      font-weight: 700;
      color: #8b7355;
      cursor: pointer;
      font-family: 'Zen Maru Gothic', sans-serif;
      transition: background 0.15s;
    }
    .clear-btn:active { background: #e8ddd0; }
    .submit-btn {
      flex: 2;
      background: #c0561e;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      font-family: 'Zen Maru Gothic', sans-serif;
      letter-spacing: 0.06em;
      transition: opacity 0.15s;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .submit-btn:not(:disabled):active { opacity: 0.85; }

    /* 判定オーバーレイ */
    .result-overlay {
      position: fixed;
      inset: 0;
      background: rgba(45,32,22,0.55);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .result-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .result-card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 28px 28px 0 0;
      padding: 28px 24px 40px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .result-overlay.show .result-card {
      transform: translateY(0);
    }
    .result-icon {
      font-size: 56px;
      text-align: center;
      margin-bottom: 10px;
    }
    .result-label {
      font-size: 22px; font-weight: 900;
      text-align: center;
      margin-bottom: 6px;
    }
    .result-label.correct { color: #1a7a3e; }
    .result-label.wrong { color: #c0561e; }
    .result-detail {
      font-size: 14px; color: #8b7355;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .result-answer {
      font-size: 36px; font-weight: 900;
      text-align: center;
      color: #2d2016;
      margin-bottom: 20px;
    }
    .next-btn {
      width: 100%;
      background: #2d2016;
      border: none;
      border-radius: 16px;
      padding: 18px;
      font-size: 16px;
      font-weight: 900;
      color: #faf7f2;
      cursor: pointer;
      font-family: 'Zen Maru Gothic', sans-serif;
      letter-spacing: 0.08em;
      transition: opacity 0.15s;
    }
    .next-btn:active { opacity: 0.85; }

    /* ===== RESULT SCREEN ===== */
    #result-screen {
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 24px;
    }
    .final-icon { font-size: 80px; line-height: 1; }
    .final-title {
      font-size: 28px; font-weight: 900;
      color: #2d2016;
      text-align: center;
    }
    .score-card {
      background: #fff;
      border-radius: 22px;
      padding: 28px 40px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(45,32,22,0.1);
      width: 100%;
    }
    .score-num {
      font-size: 64px; font-weight: 900;
      color: #c0561e;
      line-height: 1;
    }
    .score-sub {
      font-size: 14px; color: #8b7355;
      font-weight: 700;
      margin-top: 6px;
    }
    .score-breakdown {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 14px;
    }
    .score-item {
      display: flex; flex-direction: column;
      gap: 4px; align-items: center;
    }
    .score-item-num {
      font-size: 24px; font-weight: 900;
    }
    .score-item-num.ok { color: #1a7a3e; }
    .score-item-num.ng { color: #c0561e; }
    .score-item-label {
      font-size: 11px; color: #b5a08a;
      font-weight: 700; letter-spacing: 0.1em;
    }
    .wrong-list-section { width: 100%; }
    .wrong-list-title {
      font-size: 12px; font-weight: 700;
      color: #b5a08a; letter-spacing: 0.1em;
      margin-bottom: 10px;
    }
    .wrong-list {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .wrong-item {
      background: #fff;
      border: 2px solid #f3ede6;
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 16px; font-weight: 700;
      color: #2d2016;
      display: flex; flex-direction: column;
      align-items: center; gap: 2px;
    }
    .wrong-item-reading {
      font-size: 10px; color: #b5a08a; font-weight: 500;
    }
    .retry-btn {
      width: 100%;
      background: #c0561e;
      border: none;
      border-radius: 18px;
      padding: 18px;
      font-size: 17px; font-weight: 900;
      color: #fff;
      cursor: pointer;
      font-family: 'Zen Maru Gothic', sans-serif;
      letter-spacing: 0.08em;
      transition: opacity 0.15s;
    }
    .retry-btn:active { opacity: 0.85; }
    .home-btn {
      background: none;
      border: 2px solid #e8ddd0;
      border-radius: 18px;
      padding: 16px;
      width: 100%;
      font-size: 15px; font-weight: 700;
      color: #8b7355;
      cursor: pointer;
      font-family: 'Zen Maru Gothic', sans-serif;
      transition: background 0.15s;
    }
    .home-btn:active { background: #f3ede6; }

    /* ローディング */
    .loading-indicator {
      display: flex; align-items: center;
      gap: 8px;
      font-size: 13px; color: #b5a08a;
      font-weight: 700;
      justify-content: center;
      padding: 4px 0;
      min-height: 22px;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #e8ddd0;
      border-top-color: #c0561e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app">

  <!-- ===== スタート画面 ===== -->
  <div id="start-screen" class="screen active">
    <div class="app-icon">📖</div>
    <div>
      <div class="app-title">かんじ手帳</div>
      <div class="app-sub">手書きで漢字を練習しよう<br>1セット10問</div>
    </div>

    <div class="level-section">
      <span class="level-label">LEVEL を選ぼう</span>
      <div class="level-grid">
        <button class="level-btn" data-level="1" onclick="selectLevel(1)">
          <span class="lv-kanji">一</span>
          <span class="lv-label">1年生</span>
        </button>
        <button class="level-btn" data-level="2" onclick="selectLevel(2)">
          <span class="lv-kanji">二</span>
          <span class="lv-label">2年生</span>
        </button>
        <button class="level-btn" data-level="3" onclick="selectLevel(3)">
          <span class="lv-kanji">三</span>
          <span class="lv-label">3年生</span>
        </button>
        <button class="level-btn" data-level="4" onclick="selectLevel(4)">
          <span class="lv-kanji">四</span>
          <span class="lv-label">4年生</span>
        </button>
        <button class="level-btn" data-level="5" onclick="selectLevel(5)">
          <span class="lv-kanji">五</span>
          <span class="lv-label">5年生</span>
        </button>
        <button class="level-btn" data-level="6" onclick="selectLevel(6)">
          <span class="lv-kanji">六</span>
          <span class="lv-label">6年生</span>
        </button>
      </div>
    </div>

    <button class="start-btn" id="start-btn" disabled onclick="startQuiz()">
      はじめる →
    </button>
  </div>

  <!-- ===== クイズ画面 ===== -->
  <div id="quiz-screen" class="screen">
    <div class="quiz-header">
      <span class="header-title" id="header-level-label">1年生</span>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <span class="progress-text" id="progress-text">0 / 30</span>
    </div>

    <div class="quiz-body">
      <!-- 問題カード -->
      <div class="question-card">
        <div class="question-hint">この読みかたの漢字を書こう！</div>
        <div class="question-reading" id="question-reading">―</div>
        <div class="question-meaning" id="question-meaning">意味の例</div>
      </div>

      <!-- 手書きキャンバス -->
      <div class="canvas-section">
        <span class="canvas-label">ここに書こう</span>
        <div class="canvas-wrap" id="canvas-wrap">
          <canvas id="draw-canvas"></canvas>
          <svg class="canvas-guide" id="canvas-guide" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="loading-indicator" id="loading-indicator" style="display:none">
          <div class="spinner"></div>
          <span>判定中...</span>
        </div>
        <div class="canvas-actions">
          <button class="clear-btn" onclick="clearCanvas()">消す</button>
          <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">答えを送る</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 判定オーバーレイ -->
  <div class="result-overlay" id="result-overlay">
    <div class="result-card">
      <div class="result-icon" id="result-icon">🎉</div>
      <div class="result-label" id="result-label">せいかい！</div>
      <div class="result-detail" id="result-detail"></div>
      <div class="result-answer" id="result-answer"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">つぎへ →</button>
    </div>
  </div>

  <!-- ===== 結果画面 ===== -->
  <div id="result-screen" class="screen">
    <div class="final-icon" id="final-icon">🏆</div>
    <div class="final-title" id="final-title">おわり！</div>
    <div class="score-card">
      <div class="score-num" id="score-num">0</div>
      <div class="score-sub">/ 10問 せいかい</div>
      <div class="score-breakdown">
        <div class="score-item">
          <span class="score-item-num ok" id="correct-count">0</span>
          <span class="score-item-label">せいかい</span>
        </div>
        <div class="score-item">
          <span class="score-item-num ng" id="wrong-count">0</span>
          <span class="score-item-label">まちがい</span>
        </div>
      </div>
    </div>
    <div class="wrong-list-section" id="wrong-list-section" style="display:none">
      <div class="wrong-list-title">まちがえた漢字</div>
      <div class="wrong-list" id="wrong-list"></div>
    </div>
    <button class="retry-btn" onclick="retryQuiz()">もう一度やる 🔄</button>
    <button class="home-btn" onclick="goHome()">レベル選択へ</button>
  </div>

</div>

// ===== 状態 =====
let selectedLevel = null;
let currentQuestions = [];
let currentIndex = 0;
let correctCount = 0;
let wrongList = [];
let isDrawing = false;
let lastX = 0, lastY = 0;
let hasDrawn = false;
let isSubmitting = false;
let canvasInitialized = false;

// ===== キャンバス =====
let canvas, ctx;

function initCanvas() {
  canvas = document.getElementById('draw-canvas');
  const wrap = document.getElementById('canvas-wrap');
  const w = wrap.clientWidth;
  const h = Math.round(w * 0.8);
  canvas.width = w;
  canvas.height = h;
  canvas.style.height = h + 'px';
  ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, w, h);
  drawGuide(w, h);
  ctx.strokeStyle = '#2d2016';
  ctx.lineWidth = Math.max(4, w / 60);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // PointerEvent（Apple Pencil / タッチ / マウス 統合）
  if (!canvasInitialized) {
    canvas.style.touchAction = 'none';
    canvas.addEventListener('pointerdown', e => { e.preventDefault(); startDraw(e); });
    canvas.addEventListener('pointermove', e => { e.preventDefault(); draw(e); });
    canvas.addEventListener('pointerup', endDraw);
    canvas.addEventListener('pointercancel', endDraw);
    canvas.addEventListener('pointerleave', endDraw);
    canvasInitialized = true;
  }
}

function drawGuide(w, h) {
  const guide = document.getElementById('canvas-guide');
  guide.setAttribute('viewBox', `0 0 ${w} ${h}`);
  guide.setAttribute('width', w);
  guide.setAttribute('height', h);
  const cx = w / 2, cy = h / 2;
  const strokeColor = '#e8ddd0';
  guide.innerHTML = `
    <line x1="${cx}" y1="0" x2="${cx}" y2="${h}" stroke="${strokeColor}" stroke-width="1" stroke-dasharray="6,4"/>
    <line x1="0" y1="${cy}" x2="${w}" y2="${cy}" stroke="${strokeColor}" stroke-width="1" stroke-dasharray="6,4"/>
    <line x1="0" y1="0" x2="${w}" y2="${h}" stroke="${strokeColor}" stroke-width="0.8" stroke-dasharray="4,8"/>
    <line x1="${w}" y1="0" x2="0" y2="${h}" stroke="${strokeColor}" stroke-width="0.8" stroke-dasharray="4,8"/>
    <rect x="1" y="1" width="${w-2}" height="${h-2}" fill="none" stroke="${strokeColor}" stroke-width="2" rx="17"/>
  `;
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

function getPressure(e) {
  // Apple Pencilは pressure が 0〜1 で返る
  if (e.pointerType === 'pen' && e.pressure > 0) return e.pressure;
  return 0.5;
}

function startDraw(e) {
  isDrawing = true;
  canvas.setPointerCapture(e.pointerId);
  const pos = getPos(e);
  lastX = pos.x; lastY = pos.y;
  const pressure = getPressure(e);
  ctx.lineWidth = Math.max(3, (canvas.width / 55) * (0.6 + pressure * 0.8));
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, ctx.lineWidth / 2, 0, Math.PI * 2);
  ctx.fillStyle = '#2d2016';
  ctx.fill();
  hasDrawn = true;
}

function draw(e) {
  if (!isDrawing) return;
  const pos = getPos(e);
  const pressure = getPressure(e);
  ctx.lineWidth = Math.max(3, (canvas.width / 55) * (0.6 + pressure * 0.8));
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
  lastX = pos.x; lastY = pos.y;
}

function endDraw() { isDrawing = false; }

function clearCanvas() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  hasDrawn = false;
}

// ===== レベル選択 =====
function selectLevel(level) {
  selectedLevel = level;
  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.level) === level);
  });
  document.getElementById('start-btn').disabled = false;
}

// ===== クイズ開始 =====
function startQuiz() {
  const all = KANJI_DATA[selectedLevel];
  const shuffled = [...all].sort(() => Math.random() - 0.5);
  currentQuestions = shuffled.slice(0, 10);
  currentIndex = 0;
  correctCount = 0;
  wrongList = [];

  document.getElementById('header-level-label').textContent = selectedLevel + '年生';
  showScreen('quiz-screen');
  initCanvas();
  showQuestion();
}

function showQuestion() {
  const q = currentQuestions[currentIndex];
  document.getElementById('question-reading').textContent = q.reading;
  document.getElementById('question-meaning').textContent = q.meaning;
  document.getElementById('progress-text').textContent = (currentIndex + 1) + ' / 10';
  document.getElementById('progress-bar').style.width = ((currentIndex + 1) / 10 * 100) + '%';
  clearCanvas();
  hasDrawn = false;
  isSubmitting = false;
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('loading-indicator').style.display = 'none';
}

// ===== 答え送信 =====
async function submitAnswer() {
  if (!hasDrawn || isSubmitting) return;
  isSubmitting = true;
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('loading-indicator').style.display = 'flex';

  const imageData = canvas.toDataURL('image/png').split(',')[1];
  const q = currentQuestions[currentIndex];

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: 'image/png', data: imageData }
            },
            {
              type: 'text',
              text: `この手書きの画像を見て、漢字の正誤判定をしてください。

問題: 「${q.reading}」という読みの漢字を書く問題です。
正解の漢字: 「${q.kanji}」

画像に書かれた手書きの漢字を読み取り、「${q.kanji}」として判定できるかどうか判断してください。
多少形が崩れていても、漢字として認識できれば正解とします。

以下のJSON形式のみで回答してください（他の文は不要）:
{"correct": true/false, "recognized": "認識した文字", "comment": "一言コメント（日本語・短く）"}`
            }
          ]
        }]
      })
    });

    if (!response.ok) {
      const errJson = await response.json().catch(() => ({}));
      throw new Error(errJson?.error?.message || 'API error ' + response.status);
    }
    const data = await response.json();
    const text = data.content?.[0]?.text?.trim() || '';
    let result;
    try {
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      result = JSON.parse(jsonMatch ? jsonMatch[0] : text);
    } catch {
      result = { correct: false, recognized: '?', comment: '読み取れませんでした' };
    }

    showResult(result);
  } catch (err) {
    console.error('API Error:', err);
    showResult({ correct: false, recognized: '?', comment: '通信エラー。スキップします。' });
  }
}

function showResult(result) {
  document.getElementById('loading-indicator').style.display = 'none';
  const q = currentQuestions[currentIndex];
  const overlay = document.getElementById('result-overlay');
  const icon = document.getElementById('result-icon');
  const label = document.getElementById('result-label');
  const detail = document.getElementById('result-detail');
  const answer = document.getElementById('result-answer');

  if (result.correct) {
    correctCount++;
    icon.textContent = '🎉';
    label.textContent = 'せいかい！';
    label.className = 'result-label correct';
    detail.textContent = result.comment || 'よくできました！';
  } else {
    wrongList.push(q);
    icon.textContent = '😢';
    label.textContent = 'もう少し！';
    label.className = 'result-label wrong';
    detail.textContent = result.recognized
      ? `書いた文字:「${result.recognized}」 / ${result.comment || ''}`
      : result.comment || 'もう一度練習してみよう';
  }
  answer.textContent = '正解: ' + q.kanji;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = currentIndex < 9 ? 'つぎへ →' : '結果をみる';
  overlay.classList.add('show');
}

function nextQuestion() {
  document.getElementById('result-overlay').classList.remove('show');
  currentIndex++;
  if (currentIndex >= 10) {
    showFinalResult();
  } else {
    showQuestion();
  }
}

function showFinalResult() {
  showScreen('result-screen');
  document.getElementById('score-num').textContent = correctCount;
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent = 10 - correctCount;

  const pct = correctCount / 10;
  let icon = '🏆', title = 'すばらしい！';
  if (pct < 0.5) { icon = '📚'; title = 'もっと練習しよう！'; }
  else if (pct < 0.7) { icon = '💪'; title = 'よくがんばった！'; }
  else if (pct < 0.9) { icon = '⭐'; title = 'なかなかいい！'; }
  document.getElementById('final-icon').textContent = icon;
  document.getElementById('final-title').textContent = title;

  const wrongSection = document.getElementById('wrong-list-section');
  const wrongListEl = document.getElementById('wrong-list');
  if (wrongList.length > 0) {
    wrongSection.style.display = 'block';
    wrongListEl.innerHTML = wrongList.map(q =>
      `<div class="wrong-item">
        <span>${q.kanji}</span>
        <span class="wrong-item-reading">${q.reading}</span>
      </div>`
    ).join('');
  } else {
    wrongSection.style.display = 'none';
  }
}

function retryQuiz() { startQuiz(); }
function goHome() { showScreen('start-screen'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
